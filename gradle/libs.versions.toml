[versions]
# Gradle
check-style = "13.3.0"
shadow = "9.4.0"
resource-factory = "1.3.1"
run-paper = "3.0.2"
gremlin = "0.0.9"
indra-licenser-spotless = "4.0.0"

# Java
caffeine = "3.2.3"
guice = "7.0.0"
result4j = "1.2.0"
paper-api = "1.21.11-R0.1-SNAPSHOT"
mini-placeholders = "3.1.0"
configurate = "4.2.0"
adventure-serializer-configurate = "4.26.1"
kotonoha = "0.2.0"

[libraries]
caffeine = { group = "com.github.ben-manes.caffeine", name = "caffeine", version.ref = "caffeine" }
guice = { group = "com.google.inject", name = "guice", version.ref = "guice" }
result4j = { group = "com.github.sviperll", name = "result4j", version.ref = "result4j" }
paper-api = { group = "io.papermc.paper", name = "paper-api", version.ref = "paper-api" }
mini-placeholders = { group = "io.github.miniplaceholders", name = "miniplaceholders-api", version.ref = "mini-placeholders" }
configurate-yaml = { group = "org.spongepowered", name = "configurate-yaml", version.ref = "configurate" }
adventure-serializer-configurate = { group = "net.kyori", name = "adventure-serializer-configurate4", version.ref = "adventure-serializer-configurate" }
kotonoha-message = { group = "io.github.namiuni", name = "kotonoha-message", version.ref = "kotonoha" }
kotonoha-message-extra-miniplaceholders = { group = "io.github.namiuni", name = "kotonoha-message-extra-miniplaceholders", version.ref = "kotonoha" }
kotonoha-translator = { group = "io.github.namiuni", name = "kotonoha-translator", version.ref = "kotonoha" }
kotonoha-resourcebundle-generator = { group = "io.github.namiuni", name = "kotonoha-resourcebundle-generator-processor", version.ref = "kotonoha" }

[plugins]
shadow = { id = "com.gradleup.shadow", version.ref = "shadow" }
resource-factory = { id = "xyz.jpenilla.resource-factory-paper-convention", version.ref = "resource-factory" }
run-paper = { id = "xyz.jpenilla.run-paper", version.ref = "run-paper" }
gremlin = { id = "xyz.jpenilla.gremlin-gradle", version.ref = "gremlin" }
indra-licenser-spotless = { id = "net.kyori.indra.licenser.spotless", version.ref = "indra-licenser-spotless" }
